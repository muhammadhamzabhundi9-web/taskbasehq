-content:center;border-radius:7px;background:rgba(255,255,255,0.025);flex-shrink:0}.tin{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tid{color:#475569;font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sf{padding:10px 12px;border-top:1px solid rgba(255,255,255,0.06);display:flex;gap:5px}.sl{flex:1;display:flex;align-items:center;justify-content:center;gap:3px;padding:7px;border-radius:7px;text-decoration:none;font-size:9px;font-weight:700}.main{flex:1;display:flex;flex-direction:column;min-width:0}.tb{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid rgba(255,255,255,0.06);background:#080b14}.mb{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:#94a3b8;width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:15px;display:none;align-items:center;justify-content:center}.tn{color:#fff;font-size:16px;font-weight:800}.td2{color:#475569;font-size:10px;margin-top:1px}.tbg{padding:4px 10px;border-radius:7px;font-size:10px;font-weight:700}.ct{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:14px 18px}.ib{width:100%;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.06);border-radius:11px;padding:12px 14px;color:#fff;font-size:13px;font-family:'Outfit',sans-serif;outline:none;resize:none;line-height:1.6}.ib:focus{border-color:rgba(59,130,246,0.35)}.ch{display:flex;gap:5px;margin:6px 0;flex-wrap:wrap}.cp{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);padding:4px 10px;border-radius:16px;color:#94a3b8;font-size:10px;cursor:pointer;transition:all .15s;white-space:nowrap}.cp:hover{background:rgba(59,130,246,0.08);border-color:rgba(59,130,246,0.2);color:#3b82f6}.br{display:flex;gap:6px;align-items:center;flex-wrap:wrap}.gb{border:none;color:#fff;padding:10px 24px;border-radius:9px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}.gb:disabled{opacity:.5;cursor:wait}.sb2{background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.06);color:#94a3b8;padding:8px 14px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}.sb2:hover{background:rgba(255,255,255,0.07);color:#fff}.cc{color:#475569;font-size:9px;margin-left:auto}.ob{flex:1;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.05);border-radius:12px;overflow-y:auto;position:relative;margin-top:10px}.ot{position:sticky;top:0;padding:8px 14px;background:rgba(6,8,16,0.95);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center;z-index:5}.ol{color:#475569;font-size:10px;font-weight:600}.os{display:flex;gap:10px}.os span{color:#475569;font-size:9px}.oc{padding:18px;animation:fadeIn .3s}.oc h1,.oc h2,.oc h3{color:#fff;margin:16px 0 8px}.oc h1{font-size:20px;font-weight:900;border-bottom:1px solid rgba(255,255,255,0.05);padding-bottom:6px}.oc h2{font-size:17px;font-weight:800}.oc h3{font-size:14px;font-weight:700;color:#94a3b8}.oc p{color:#cbd5e1;font-size:13px;line-height:1.8;margin:6px 0}.oc ul,.oc ol{color:#cbd5e1;font-size:13px;line-height:1.8;padding-left:20px;margin:6px 0}.oc strong{color:#fff}.oc em{color:#94a3b8}.oc code{background:rgba(59,130,246,0.08);color:#60a5fa;padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:12px}.oc pre{background:#0a0d16;border:1px solid rgba(255,255,255,0.05);border-radius:9px;padding:14px;margin:10px 0;overflow-x:auto}.oc pre code{background:none;color:#e2e8f0;padding:0;font-size:12px;line-height:1.5}.oc blockquote{border-left:3px solid #3b82f6;padding:6px 14px;margin:10px 0;background:rgba(59,130,246,0.04);border-radius:0 7px 7px 0}.oc hr{border:none;border-top:1px solid rgba(255,255,255,0.05);margin:14px 0}.oc table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px}.oc th{background:rgba(255,255,255,0.03);color:#fff;padding:8px 12px;text-align:left;font-size:11px;font-weight:700;border:1px solid rgba(255,255,255,0.05)}.oc td{padding:7px 12px;border:1px solid rgba(255,255,255,0.05);color:#cbd5e1}.ov2{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:40}.ov2.show{display:block}@media(max-width:768px){.sidebar{position:fixed;left:0;top:0;bottom:0;z-index:50;transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.mb{display:flex}.ct{padding:10px 12px}}
</style>
</head>
<body>
<div class="app">
<div class="ov2" id="ov" onclick="toggleSB()"></div>
<div class="sidebar" id="sb"><div class="sh"><div class="lr"><div class="lb">TB</div><div><div class="ln">TaskBase HQ</div><div class="ls">AI TOOLS PLATFORM</div></div></div><div class="bg"><div class="bd"></div><span class="bt">PRO ACCESS</span><span class="bu" id="uC">0 uses</span></div></div><div class="tl" id="tL"></div><div style="padding:10px 12px;border-top:1px solid rgba(255,255,255,0.06)">
<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
<div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0" id="userAvatarText">U</div>
<img id="userAvatar" style="display:none;width:28px;height:28px;border-radius:50%;object-fit:cover" src="">
<div style="flex:1;min-width:0"><div style="color:#fff;font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="userName">Loading...</div></div>
<button onclick="logout()" style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);color:#ef4444;padding:4px 8px;border-radius:6px;font-size:9px;font-weight:700;cursor:pointer;font-family:inherit">Logout</button>
</div>
<div style="display:flex;gap:4px">
<a href="https://wa.me/923232108023" target="_blank" class="sl" style="background:rgba(37,211,102,0.05);border:1px solid rgba(37,211,102,0.1);color:#25D366">💬</a>
<a href="mailto:support@taskbasehq.com" class="sl" style="background:rgba(59,130,246,0.05);border:1px solid rgba(59,130,246,0.1);color:#3b82f6">📧</a>
<a href="/" class="sl" style="background:rgba(6,182,212,0.05);border:1px solid rgba(6,182,212,0.1);color:#06b6d4">🏠</a>
</div></div></div>
<div class="main"><div class="tb"><button class="mb" onclick="toggleSB()">☰</button><span style="font-size:24px" id="tI">🤖</span><div style="flex:1"><div class="tn" id="tN">AI Chat Assistant</div><div class="td2" id="tD">Chat with advanced AI</div></div><div class="tbg" id="tB" style="background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.15);color:#3b82f6">⚡ AI</div></div>
<div class="ct"><div style="margin-bottom:10px"><div style="color:#94a3b8;font-size:10px;font-weight:600;margin-bottom:4px">💡 <span id="iL">What do you want to know?</span></div><textarea class="ib" id="iB" rows="3" placeholder="Ask me anything..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();gen()}" oninput="ucc()"></textarea><div class="ch" id="cH"></div><div class="br"><button class="gb" id="gB" onclick="gen()" style="background:linear-gradient(135deg,#3b82f6,#06b6d4);box-shadow:0 4px 12px rgba(59,130,246,0.2)">⚡ Generate</button><button class="sb2" onclick="cpO()" id="cpB" style="display:none">📋 Copy</button><button class="sb2" onclick="dlO()" id="dlB" style="display:none">💾 Download</button><button class="sb2" onclick="clr()" id="clB" style="display:none">🗑️ Clear</button><span class="cc" id="cC"></span></div></div><div class="ob" id="oA"><div style="padding:50px 20px;text-align:center"><div style="font-size:42px;margin-bottom:12px;opacity:0.2">✨</div><div style="color:#475569;font-size:13px">Your AI content will appear here</div><div style="color:#334155;font-size:11px;margin-top:4px">Select a tool, type your prompt, hit Generate</div></div></div></div></div>
</div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, doc, getDoc, updateDoc, increment } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
const firebaseConfig={apiKey:"AIzaSyCBEDDYCZsmHgyqkOpYQeOLqZ9v7eDMvf4",authDomain:"taskbasehq.firebaseapp.com",projectId:"taskbasehq",storageBucket:"taskbasehq.firebasestorage.app",messagingSenderId:"1052144829969",appId:"1:1052144829969:web:ba5734947494298d9d13b0"};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
onAuthStateChanged(auth,async(user)=>{
  if(!user){window.location.href='/login.html';return;}
  const userRef=doc(db,'users',user.uid);
  const userSnap=await getDoc(userRef);
  const ud=userSnap.data();
  if(ud){
    const tEnd=new Date(ud.trialEnd);
    const dLeft=Math.ceil((tEnd-new Date())/(1000*60*60*24));
    if(ud.plan==='trial'&&dLeft<=0){document.getElementById('uC').textContent='Trial expired';document.getElementById('uC').style.color='#ef4444';}
    else if(ud.plan==='trial'){document.getElementById('uC').textContent=dLeft+' days left';document.getElementById('uC').style.color='#10b981';}
    else{document.getElementById('uC').textContent='Pro ✓';document.getElementById('uC').style.color='#3b82f6';}
  }
  const uName=user.displayName||user.email.split('@')[0];
  document.getElementById('userName').textContent=uName;
  const avatarText=document.getElementById('userAvatarText');
  if(avatarText)avatarText.textContent=uName.charAt(0).toUpperCase();
  if(user.photoURL){
    document.getElementById('userAvatar').src=user.photoURL;
    document.getElementById('userAvatar').style.display='block';
    if(avatarText)avatarText.style.display='none';
  }
  window.logout=async()=>{await signOut(auth);window.location.href='/login.html';};
  window.trackUsage=async()=>{try{await updateDoc(userRef,{usageTotal:increment(1)});}catch(e){}};
});
</script>
<script src="/tools.js"></script>
</body>
