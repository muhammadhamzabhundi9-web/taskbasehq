<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TaskBase HQ — AI Dashboard (Testing)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060810;font-family:'Outfit',-apple-system,sans-serif;color:#f1f5f9;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:4px}
textarea::placeholder{color:#4a5568!important}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

.app{display:flex;height:100vh}
.sidebar{width:280px;background:#0a0e1a;border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;flex-shrink:0;transition:transform 0.3s}
.sidebar-header{padding:16px;border-bottom:1px solid rgba(255,255,255,0.06)}
.logo-row{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff}
.logo-name{color:#fff;font-size:15px;font-weight:900}
.logo-sub{color:#06b6d4;font-size:9px;font-weight:700;letter-spacing:1.5px}
.trial-badge{display:flex;align-items:center;gap:6px;margin-top:12px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);padding:6px 10px;border-radius:8px}
.trial-dot{width:6px;height:6px;border-radius:50%;background:#10b981}
.trial-text{color:#10b981;font-size:11px;font-weight:700}
.usage-text{color:#475569;font-size:10px;margin-left:auto}
.tools-list{flex:1;overflow-y:auto;padding:8px}
.tools-label{color:#475569;font-size:10px;font-weight:700;letter-spacing:1.5px;padding:8px 8px 6px;margin-top:4px}
.tool-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;cursor:pointer;transition:all 0.2s;border:1px solid transparent}
.tool-item:hover{background:rgba(255,255,255,0.03)}
.tool-item.active{border-color:rgba(59,130,246,0.3)}
.tool-icon{font-size:22px}
.tool-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tool-desc{color:#475569;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,0.06)}
.support-btns{display:flex;gap:8px}
.support-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:8px;border-radius:8px;text-decoration:none;font-size:11px;font-weight:700}

.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.06);background:#0a0e1a}
.menu-btn{background:rgba(255,255,255,0.05);border:none;color:#94a3b8;width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:18px;display:none}
.topbar-icon{font-size:24px}
.topbar-name{color:#fff;font-size:16px;font-weight:800}
.topbar-desc{color:#475569;font-size:11px}
.ai-badge{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700}

.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.input-area{padding:16px 16px 0}
.input-box{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px 16px;color:#fff;font-size:14px;font-family:inherit;outline:none;resize:vertical;line-height:1.6}
.btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.gen-btn{border:none;color:#fff;padding:11px 24px;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit}
.sec-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.06);color:#94a3b8;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.output-area{flex:1;margin:12px 16px 16px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:14px;overflow-y:auto;position:relative}
.output-header{position:sticky;top:0;padding:8px 16px;background:rgba(6,8,16,0.95);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center}
.output-label{color:#475569;font-size:11px;font-weight:600}
.output-text{padding:20px;white-space:pre-wrap;color:#f1f5f9;font-size:14px;line-height:1.8;font-family:'Segoe UI',system-ui,sans-serif}
.empty-state{padding:40px;text-align:center}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:0.3}
.empty-text{color:#475569;font-size:14px}
.loading{padding:40px;text-align:center}
.loading-icon{font-size:32px;margin-bottom:12px;animation:spin 1s linear infinite}
.loading-text{color:#3b82f6;font-size:14px;font-weight:700}
.loading-sub{color:#475569;font-size:12px;margin-top:4px}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:40}
.overlay.show{display:block}
.test-banner{position:fixed;top:0;left:0;right:0;z-index:100;background:linear-gradient(135deg,#f59e0b,#ef4444);padding:6px;text-align:center;font-size:12px;font-weight:800;color:#fff}

@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:50;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .menu-btn{display:flex;align-items:center;justify-content:center}
}
</style>
</head>
<body>

<div class="test-banner">⚠️ TESTING MODE — This is a preview. Not live yet.</div>

<div class="app" style="margin-top:28px">
  <!-- Overlay -->
  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-row">
        <div class="logo-icon">TB</div>
        <div><div class="logo-name">TaskBase HQ</div><div class="logo-sub">AI TOOLS PLATFORM</div></div>
      </div>
      <div class="trial-badge">
        <div class="trial-dot"></div>
        <span class="trial-text">TESTING MODE</span>
        <span class="usage-text" id="usageCount">0 uses</span>
      </div>
    </div>
    <div class="tools-list" id="toolsList"></div>
    <div class="sidebar-footer">
      <div class="support-btns">
        <a href="https://wa.me/923232108023" target="_blank" class="support-btn" style="background:rgba(37,211,102,0.08);border:1px solid rgba(37,211,102,0.15);color:#25D366">💬 Support</a>
        <a href="mailto:support@taskbasehq.com" class="support-btn" style="background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.15);color:#3b82f6">📧 Email</a>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <span class="topbar-icon" id="topIcon">🤖</span>
      <div style="flex:1">
        <div class="topbar-name" id="topName">AI Chat Assistant</div>
        <div class="topbar-desc" id="topDesc">Chat with advanced AI</div>
      </div>
      <div class="ai-badge" id="aiBadge" style="background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:#3b82f6">⚡ Powered by AI</div>
    </div>

    <div class="content">
      <div class="input-area">
        <textarea class="input-box" id="inputBox" rows="4" placeholder="Ask me anything..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();generate()}"></textarea>
        <div class="btn-row">
          <button class="gen-btn" id="genBtn" onclick="generate()" style="background:linear-gradient(135deg,#3b82f6,#06b6d4);box-shadow:0 4px 15px rgba(59,130,246,0.3)">⚡ Generate</button>
          <button class="sec-btn" onclick="copyOutput()" id="copyBtn" style="display:none">📋 Copy</button>
          <button class="sec-btn" onclick="clearAll()" id="clearBtn" style="display:none">🗑️ Clear</button>
        </div>
      </div>
      <div class="output-area" id="outputArea">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">✨</div>
          <div class="empty-text">Your AI-generated content will appear here</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API_URL = '/api/generate';

const TOOLS = [
  {id:"chat",name:"AI Chat Assistant",icon:"🤖",desc:"Chat with advanced AI — ask anything",color:"#3b82f6",placeholder:"Ask me anything...",
   prompt:i=>i},
  {id:"writer",name:"AI Content Writer",icon:"📝",desc:"Blog posts, articles, ad copy — SEO optimized",color:"#10b981",placeholder:"Topic: e.g., 'Benefits of AI in healthcare'",
   prompt:i=>`You are an expert content writer. Write a well-structured, engaging, SEO-optimized article about: ${i}. Use headers, make it comprehensive, at least 500 words.`},
  {id:"code",name:"AI Code Generator",icon:"💻",desc:"Write, debug, explain code in 50+ languages",color:"#8b5cf6",placeholder:"e.g., 'Write a Python web scraper'",
   prompt:i=>`You are an expert programmer. ${i}. Provide clean, well-commented code with explanations.`},
  {id:"translator",name:"AI Translator Pro",icon:"🌐",desc:"Translate text to 130+ languages",color:"#06b6d4",placeholder:"e.g., 'Translate to French: Good morning'",
   prompt:i=>`You are a professional translator. Translate accurately while preserving tone and context. If target language not specified, translate to English: ${i}`},
  {id:"email",name:"AI Outreach Writer",icon:"📧",desc:"Cold emails & follow-ups that get replies",color:"#f59e0b",placeholder:"e.g., 'Cold email to pitch design services'",
   prompt:i=>`You are an expert email copywriter. Write a compelling email for: ${i}. Include subject line. Provide 2 variations. Make it concise and action-oriented.`},
  {id:"social",name:"AI Social Media Kit",icon:"📱",desc:"Posts + captions + hashtags for all platforms",color:"#ec4899",placeholder:"e.g., 'Promote a new coffee shop'",
   prompt:i=>`You are a social media expert. Create content for: ${i}. Include: 1) Instagram caption+hashtags 2) Twitter/X post 3) LinkedIn post 4) Facebook post 5) TikTok/Reel idea.`},
  {id:"seo",name:"AI SEO & Keywords",icon:"🔍",desc:"Keywords, meta tags, SEO strategy",color:"#14b8a6",placeholder:"e.g., 'SEO for online fitness coaching'",
   prompt:i=>`You are an SEO expert. Provide complete SEO strategy for: ${i}. Include: Top 20 keywords, Meta title/description, Content outline, On-page tips, Content gaps.`},
  {id:"research",name:"AI Research Agent",icon:"🔬",desc:"Deep research reports with insights",color:"#6366f1",placeholder:"e.g., 'Market research on AI tools 2026'",
   prompt:i=>`You are a research analyst. Write a comprehensive report on: ${i}. Include: Executive Summary, Key Findings, Analysis, Statistics, Recommendations, Conclusion.`},
  {id:"resume",name:"AI Resume Builder",icon:"💼",desc:"ATS-optimized resumes that work",color:"#f97316",placeholder:"e.g., 'Developer, 3yr exp, Python, React'",
   prompt:i=>`You are a resume writer. Create an ATS-optimized resume for: ${i}. Include: Summary, Experience with metrics, Skills, Education. Professional format.`},
  {id:"document",name:"AI Document Writer",icon:"📄",desc:"Reports, proposals, SOPs",color:"#0ea5e9",placeholder:"e.g., 'Business proposal for app development'",
   prompt:i=>`You are a professional writer. Create a well-structured document for: ${i}. Use proper formatting, headers, and professional language.`},
  {id:"data",name:"AI Data Analyzer",icon:"📊",desc:"Analyze data, find patterns & insights",color:"#a855f7",placeholder:"e.g., 'Analyze e-commerce sales trends'",
   prompt:i=>`You are a data analyst. Analyze: ${i}. Include: Key Metrics, Trends, Patterns, Chart suggestions, Actionable Recommendations.`},
  {id:"product",name:"AI Product Description",icon:"🛒",desc:"E-commerce copy that sells",color:"#ef4444",placeholder:"e.g., 'Wireless headphones, 40hr battery'",
   prompt:i=>`You are an e-commerce copywriter. Write product descriptions for: ${i}. Include 3 versions: short (50w), medium (150w), long (300w). Add SEO keywords.`},
  {id:"presentation",name:"AI Presentation Maker",icon:"📊",desc:"Slide content + speaker notes",color:"#84cc16",placeholder:"e.g., 'Investor pitch for AI startup'",
   prompt:i=>`You are a presentation expert. Create 10-15 slides for: ${i}. Each slide: Title, Key Points, Speaker Notes, Suggested Visual.`},
  {id:"legal",name:"AI Legal Draft",icon:"⚖️",desc:"Contracts, NDAs, basic legal docs",color:"#78716c",placeholder:"e.g., 'Freelance contract for web dev'",
   prompt:i=>`You are a legal assistant. Draft a document for: ${i}. Include standard clauses. Add disclaimer to review with attorney.`},
  {id:"invoice",name:"AI Invoice Generator",icon:"🧾",desc:"Professional invoices in seconds",color:"#22c55e",placeholder:"e.g., '3 logo designs at $200 each'",
   prompt:i=>`You are an accounting assistant. Create a professional invoice for: ${i}. Include: Invoice#, Date, Line items, Subtotal, Tax, Total, Payment terms.`},
];

let activeTool = TOOLS[0];
let usageCount = 0;
let currentOutput = "";

function renderTools() {
  const list = document.getElementById('toolsList');
  list.innerHTML = '<div class="tools-label">AI TOOLS ('+TOOLS.length+')</div>';
  TOOLS.forEach(t => {
    const div = document.createElement('div');
    div.className = 'tool-item' + (t.id === activeTool.id ? ' active' : '');
    div.style.background = t.id === activeTool.id ? t.color+'15' : '';
    div.style.borderColor = t.id === activeTool.id ? t.color+'40' : 'transparent';
    div.innerHTML = `<span class="tool-icon">${t.icon}</span><div style="flex:1;min-width:0"><div class="tool-name" style="color:${t.id===activeTool.id?'#fff':'#94a3b8'}">${t.name}</div><div class="tool-desc">${t.desc}</div></div>`;
    div.onclick = () => selectTool(t);
    list.appendChild(div);
  });
}

function selectTool(tool) {
  activeTool = tool;
  document.getElementById('topIcon').textContent = tool.icon;
  document.getElementById('topName').textContent = tool.name;
  document.getElementById('topDesc').textContent = tool.desc;
  document.getElementById('inputBox').placeholder = tool.placeholder;
  document.getElementById('aiBadge').style.background = tool.color+'15';
  document.getElementById('aiBadge').style.borderColor = tool.color+'30';
  document.getElementById('aiBadge').style.color = tool.color;
  document.getElementById('genBtn').style.background = `linear-gradient(135deg,${tool.color},#06b6d4)`;
  document.getElementById('genBtn').style.boxShadow = `0 4px 15px ${tool.color}30`;
  document.getElementById('inputBox').value = '';
  document.getElementById('outputArea').innerHTML = '<div class="empty-state"><div class="empty-icon">✨</div><div class="empty-text">Your AI-generated content will appear here</div></div>';
  document.getElementById('copyBtn').style.display = 'none';
  document.getElementById('clearBtn').style.display = 'none';
  currentOutput = '';
  renderTools();
  toggleSidebar();
}

async function generate() {
  const input = document.getElementById('inputBox').value.trim();
  if (!input) return;
  const btn = document.getElementById('genBtn');
  btn.textContent = '⏳ Generating...';
  btn.disabled = true;
  document.getElementById('outputArea').innerHTML = '<div class="loading"><div class="loading-icon">⚡</div><div class="loading-text">AI is thinking...</div><div class="loading-sub">This may take a few seconds</div></div>';

  try {
    const prompt = activeTool.prompt(input);
    const res = await fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt:prompt})
    });
    if (!res.ok) throw new Error('API Error: '+res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    currentOutput = data.text || 'No response generated.';
    document.getElementById('outputArea').innerHTML = '<div class="output-header"><span class="output-label">📄 AI OUTPUT</span><span class="output-label">'+currentOutput.length+' chars</span></div><div class="output-text">'+escapeHtml(currentOutput)+'</div>';
    document.getElementById('copyBtn').style.display = '';
    document.getElementById('clearBtn').style.display = '';
    usageCount++;
    document.getElementById('usageCount').textContent = usageCount+' uses';
  } catch(e) {
    document.getElementById('outputArea').innerHTML = '<div class="output-text" style="color:#ef4444">Error: '+e.message+'. Please try again.</div>';
  }
  btn.textContent = '⚡ Generate';
  btn.disabled = false;
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function copyOutput() {
  navigator.clipboard?.writeText(currentOutput);
  const btn = document.getElementById('copyBtn');
  btn.textContent = '✅ Copied!';
  setTimeout(() => btn.textContent = '📋 Copy', 2000);
}

function clearAll() {
  document.getElementById('inputBox').value = '';
  document.getElementById('outputArea').innerHTML = '<div class="empty-state"><div class="empty-icon">✨</div><div class="empty-text">Your AI-generated content will appear here</div></div>';
  document.getElementById('copyBtn').style.display = 'none';
  document.getElementById('clearBtn').style.display = 'none';
  currentOutput = '';
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('show');
}

renderTools();
</script>
</body>
</html>
