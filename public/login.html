<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskBase HQ — Login</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060810;font-family:'Outfit',sans-serif;color:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.wrap{width:100%;max-width:420px;animation:fadeIn .4s ease}
.logo-row{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:32px}
.logo-box{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;box-shadow:0 4px 20px rgba(59,130,246,0.3)}
.logo-name{color:#fff;font-size:22px;font-weight:900}
.logo-sub{color:#06b6d4;font-size:9px;font-weight:700;letter-spacing:2px}
.card{background:#080b14;border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:32px}
.card-title{color:#fff;font-size:22px;font-weight:900;text-align:center;margin-bottom:6px}
.card-sub{color:#475569;font-size:13px;text-align:center;margin-bottom:28px}
.trial-badge{background:linear-gradient(135deg,rgba(16,185,129,0.1),rgba(6,182,212,0.1));border:1px solid rgba(16,185,129,0.2);border-radius:10px;padding:10px 16px;display:flex;align-items:center;gap:8px;margin-bottom:24px}
.trial-badge span{color:#10b981;font-size:12px;font-weight:700}
.google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:13px;border:1px solid rgba(255,255,255,0.1);border-radius:12px;background:rgba(255,255,255,0.04);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;margin-bottom:20px}
.google-btn:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.2)}
.divider{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.divider-line{flex:1;height:1px;background:rgba(255,255,255,0.06)}
.divider-text{color:#475569;font-size:11px;font-weight:600}
.tabs{display:flex;gap:4px;background:rgba(255,255,255,0.03);border-radius:10px;padding:4px;margin-bottom:20px}
.tab{flex:1;padding:8px;border-radius:7px;border:none;background:transparent;color:#475569;font-size:12px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s}
.tab.on{background:#3b82f6;color:#fff}
.input-group{margin-bottom:14px}
.input-label{color:#94a3b8;font-size:11px;font-weight:600;margin-bottom:5px;display:block}
.input{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:12px 14px;color:#fff;font-size:13px;font-family:'Outfit',sans-serif;outline:none;transition:border-color .2s}
.input:focus{border-color:rgba(59,130,246,0.4)}
.input::placeholder{color:#4a5568}
.submit-btn{width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#06b6d4);color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;margin-top:4px;box-shadow:0 4px 15px rgba(59,130,246,0.25)}
.submit-btn:hover{filter:brightness(1.1)}
.submit-btn:disabled{opacity:.6;cursor:wait}
.error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:10px 14px;color:#ef4444;font-size:12px;margin-bottom:14px;display:none}
.success-msg{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);border-radius:8px;padding:10px 14px;color:#10b981;font-size:12px;margin-bottom:14px;display:none}
.footer-text{color:#475569;font-size:11px;text-align:center;margin-top:20px;line-height:1.6}
.footer-text a{color:#3b82f6;text-decoration:none}
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(6,8,16,0.9);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.loading-overlay.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid rgba(59,130,246,0.2);border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite}
.loading-text{color:#3b82f6;font-size:14px;font-weight:700}
</style>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>emailjs.init("c5f49E_C8hbfbmXUE");</script>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Signing you in...</div>
</div>

<div class="wrap">
  <div class="logo-row">
    <div class="logo-box">TB</div>
    <div>
      <div class="logo-name">TaskBase HQ</div>
      <div class="logo-sub">AI TOOLS PLATFORM</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Welcome Back 👋</div>
    <div class="card-sub">Sign in to access your AI tools dashboard</div>

    <div class="trial-badge">
      <span>🎉 50 FREE Credits — No credit card required</span>
    </div>

    <button class="google-btn" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>
      Continue with Google
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">OR</span>
      <div class="divider-line"></div>
    </div>

    <div class="tabs">
      <button class="tab on" id="loginTab" onclick="switchTab('login')">Sign In</button>
      <button class="tab" id="signupTab" onclick="switchTab('signup')">Create Account</button>
    </div>

    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>

    <div id="loginForm">
      <div class="input-group">
        <label class="input-label">Email Address</label>
        <input type="email" class="input" id="loginEmail" placeholder="you@example.com">
      </div>
      <div class="input-group">
        <label class="input-label">Password</label>
        <input type="password" class="input" id="loginPassword" placeholder="Your password">
      </div>
      <button class="submit-btn" onclick="signInWithEmail()">Sign In →</button>
    </div>

    <div id="signupForm" style="display:none">
      <div class="input-group">
        <label class="input-label">Full Name</label>
        <input type="text" class="input" id="signupName" placeholder="Muhammad Hamza">
      </div>
      <div class="input-group">
        <label class="input-label">Email Address</label>
        <input type="email" class="input" id="signupEmail" placeholder="you@example.com">
      </div>
      <div class="input-group">
        <label class="input-label">Password (min 6 characters)</label>
        <input type="password" class="input" id="signupPassword" placeholder="Create a strong password">
      </div>
      <button class="submit-btn" onclick="createAccount()">Start Free — 50 Credits →</button>
    </div>

    <div class="footer-text">
      By signing in, you agree to our
      <a href="/terms.html">Terms of Service</a> &
      <a href="/privacy.html">Privacy Policy</a>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile, sendEmailVerification } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyCBEDDYCZsmHgyqkOpYQeOLqZ9v7eDMvf4",
  authDomain: "taskbasehq.firebaseapp.com",
  projectId: "taskbasehq",
  storageBucket: "taskbasehq.firebasestorage.app",
  messagingSenderId: "1052144829969",
  appId: "1:1052144829969:web:ba5734947494298d9d13b0"
});

const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();
let saving = false;

async function saveUser(user) {
  if (saving) return;
  saving = true;
  try {
    const userRef = doc(db, 'users', user.uid);
    const snap = await getDoc(userRef);
    const isNewUser = !snap.exists();

    if (isNewUser) {
      // New user — give 50 free credits
      await setDoc(userRef, {
        uid: user.uid,
        email: user.email,
        name: user.displayName || user.email.split('@')[0],
        plan: 'free',
        credits: 50,
        createdAt: new Date().toISOString(),
        lastLogin: new Date().toISOString(),
      });
      // Send welcome email ONLY for new users
      try {
        const userName = user.displayName || user.email.split('@')[0];
        await emailjs.send('service_8zans7l', 'template_a95p4nn', {
          to_email: user.email,
          to_name: userName,
          from_name: 'TaskBase HQ',
          reply_to: 'support@taskbasehq.com',
          subject: '🎉 Welcome to TaskBase HQ — Your 50 Free Credits are Ready!',
          message: 'Hi ' + userName + ',\n\nWelcome to TaskBase HQ! 🎉\n\nYour account is ready with 50 FREE CREDITS — no credit card required!\n\n✨ WHAT YOU GET:\n• 46+ Premium AI Tools (Image, Voice, Text, Code & more)\n• Vision AI Chat — ChatGPT-style assistant with file upload\n• AI Image Generator (Midjourney quality)\n• AI Voice Generator (50+ languages)\n• AI Content Writer, Resume Builder, Code Assistant\n• PDF/Word/Excel Export\n\n💰 PLANS:\n• Pro: $9.99/mo (500 credits)\n• Pro Plus: $19.99/mo (1,500 credits)\n• Pro Max: $39.99/mo (5,000 credits)\n• Yearly: Save 33%\n\n🚀 Open Your Dashboard:\nhttps://taskbasehq.com/dashboard.html\n\n📚 Need Help?\n• Email: support@taskbasehq.com\n• WhatsApp: +92 323 2108023\n• Support: https://taskbasehq.com/#support\n\nLet\'s build something amazing together!\n\nThe TaskBase HQ Team\nhttps://taskbasehq.com'
        });
      } catch(e) { console.log('Email error:', e); }
    } else {
      // Existing user — just update last login
      await setDoc(userRef, { lastLogin: new Date().toISOString() }, { merge: true });
    }
  } catch(e) {
    console.error('Save error:', e);
  }
  saving = false;
}

onAuthStateChanged(auth, async (user) => {
  if (user) {
    // Block unverified email/password users
    if (!user.emailVerified && user.providerData[0]?.providerId === 'password') {
      showError('Please verify your email first. Check your inbox.');
      await auth.signOut();
      return;
    }
    await saveUser(user);
    window.location.replace('/dashboard.html');
  }
});

window.signInWithGoogle = async () => {
  try {
    showLoading('Signing in...');
    await signInWithPopup(auth, provider);
  } catch(e) {
    hideLoading();
    showError(e.message);
  }
};

window.signInWithEmail = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPassword').value;
  if (!email || !pass) return showError('Fill all fields');
  try {
    showLoading('Signing in...');
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    hideLoading();
    showError(e.message);
  }
};

window.createAccount = async () => {
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const pass = document.getElementById('signupPassword').value;
  if (!name || !email || !pass) return showError('Fill all fields');
  if (pass.length < 6) return showError('Password min 6 chars');
  try {
    showLoading('Creating your account...');
    const result = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(result.user, { displayName: name });
    await sendEmailVerification(result.user);
    await auth.signOut();
    hideLoading();
    // Show success message
    document.getElementById('signupForm').style.display = 'none';
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'none';
    const el = document.getElementById('successMsg');
    el.innerHTML = '✅ Account created! Check your inbox (and spam folder) to verify your email, then sign in.';
    el.style.display = 'block';
  } catch(e) {
    hideLoading();
    showError(e.message);
  }
};

window.switchTab = (tab) => {
  document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('signupForm').style.display = tab === 'signup' ? '' : 'none';
  document.getElementById('loginTab').className = 'tab' + (tab === 'login' ? ' on' : '');
  document.getElementById('signupTab').className = 'tab' + (tab === 'signup' ? ' on' : '');
  document.getElementById('errorMsg').style.display = 'none';
};

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}
function showLoading(t) {
  document.getElementById('loadingText').textContent = t;
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('loginTab').classList.contains('on')) window.signInWithEmail();
    else window.createAccount();
  }
});
</script>
</body>
</html>
